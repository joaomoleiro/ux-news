---
layout: default
---
<article class="post">
  <a class="back-link" href="{{ '/' | relative_url }}">&larr; Voltar à listagem</a>

  <h1 class="post-title">{{ page.title }}</h1>
  {% if page.categoria %}<h3 class="post-categoria">{{ page.categoria }}</h3>{% endif %}

  <p class="post-meta">
    {{ page.date | date: '%b/%d/%Y' }}
    {% if page.author %} · {{ page.author }}{% endif %}
  </p>

  <div class="post-body">
    {{ content }}
  </div>
</article>
